<!DOCTYPE html>
<html dir="ltr">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="author" content="">
    <link rel="icon" type="image/svg+xml" href="../assets/images/pulpitans-logo.svg">
    <title>PULPITANS — Create Password</title>
    <link href="../dist/css/style.min.css" rel="stylesheet">
    <style>
        .password-strength-bar {
            height: 6px;
            border-radius: 3px;
            transition: width 0.3s, background-color 0.3s;
        }
        .strength-label {
            font-size: 0.78rem;
            font-weight: 600;
        }
        .req-item {
            font-size: 0.82rem;
        }
        .req-item .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #dee2e6;
            margin-right: 5px;
            vertical-align: middle;
            transition: background 0.2s;
        }
        .req-item.ok .dot  { background: #198754; }
        .req-item.ok       { color: #198754; }
        .req-item.fail .dot{ background: #dc3545; }
        .req-item.fail     { color: #dc3545; }
        .toggle-eye {
            cursor: pointer;
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #6c757d;
            z-index: 5;
        }
        .toggle-eye:hover { color: #212529; }
    </style>
</head>

<body>
    <div class="main-wrapper">
        <div class="preloader">
            <div class="lds-ripple">
                <div class="lds-pos"></div>
                <div class="lds-pos"></div>
            </div>
        </div>

        <div class="auth-wrapper d-flex no-block justify-content-center align-items-center position-relative"
            style="background:url(../assets/images/big/auth-bg.jpg) no-repeat center center; background-size:cover;">
            <div class="auth-box row" style="max-width:500px; width:100%;">
                <div class="col-12 bg-white rounded shadow">
                    <div class="p-4">
                        <div class="text-center mb-3">
                            <img src="../assets/images/pulpitans-logo.svg" alt="Pulpitans" style="height:60px;">
                        </div>
                        <h2 class="text-center">Create Password</h2>
                        <p class="text-center text-muted mb-1">
                            Welcome, <strong id="display-username">...</strong>!
                        </p>
                        <p class="text-center text-muted small mb-4">
                            This is your first login. Please set a password to continue.
                        </p>

                        <div id="form-error" class="alert alert-danger d-none" role="alert"></div>

                        <form id="set-password-form" autocomplete="off" novalidate>
                            <!-- Password -->
                            <div class="form-group mb-3">
                                <label class="form-label text-dark" for="new-pass">New Password</label>
                                <div class="position-relative">
                                    <input type="password" class="form-control pe-5" id="new-pass"
                                        placeholder="Enter new password" autocomplete="new-password">
                                    <span class="toggle-eye" id="eye-pass" title="Show / Hide">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                            id="eye-pass-icon">
                                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                            <circle cx="12" cy="12" r="3"></circle>
                                        </svg>
                                    </span>
                                </div>

                                <!-- Strength bar -->
                                <div class="mt-2">
                                    <div class="d-flex justify-content-between align-items-center mb-1">
                                        <small class="text-muted">Strength</small>
                                        <span class="strength-label" id="strength-label" style="color:#adb5bd;">—</span>
                                    </div>
                                    <div class="bg-light rounded" style="height:6px;">
                                        <div class="password-strength-bar" id="strength-bar"
                                            style="width:0%; background:#dee2e6;"></div>
                                    </div>
                                </div>

                                <!-- Requirements -->
                                <div class="mt-2">
                                    <div class="req-item" id="req-len"><span class="dot"></span>At least 4 characters</div>
                                    <div class="req-item" id="req-upper"><span class="dot"></span>At least one uppercase letter (A–Z)</div>
                                    <div class="req-item" id="req-num"><span class="dot"></span>At least one number (0–9)</div>
                                    <div class="req-item" id="req-special"><span class="dot"></span>At least one special character ( . , &amp; @ # ! )</div>
                                </div>
                            </div>

                            <!-- Confirm Password -->
                            <div class="form-group mb-4">
                                <label class="form-label text-dark" for="confirm-pass">Confirm Password</label>
                                <div class="position-relative">
                                    <input type="password" class="form-control pe-5" id="confirm-pass"
                                        placeholder="Repeat new password" autocomplete="new-password">
                                    <span class="toggle-eye" id="eye-confirm" title="Show / Hide">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                            id="eye-confirm-icon">
                                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                            <circle cx="12" cy="12" r="3"></circle>
                                        </svg>
                                    </span>
                                </div>
                                <div id="match-msg" class="form-text d-none"></div>
                            </div>

                            <div class="col-lg-12 text-center">
                                <button type="submit" id="btn-submit" class="btn w-100 btn-dark" disabled>
                                    Set Password &amp; Sign In
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/libs/jquery/dist/jquery.min.js"></script>
    <script src="../assets/libs/popper.js/dist/umd/popper.min.js"></script>
    <script src="../assets/libs/bootstrap/dist/js/bootstrap.min.js"></script>
    <script src="../dist/js/auth.js?v=2"></script>
    <script>
        const API_BASE = window.PULPITANS_API_BASE || '/api';

        // If already logged in, go straight to dashboard
        if (PulpitansAuth.getUsername()) {
            window.location.href = 'index.html';
        }

        // Hide preloader
        $(".preloader").fadeOut();

        // Read username from URL query param
        const _urlParams = new URLSearchParams(window.location.search);
        const _username  = _urlParams.get('u') || '';
        if (!_username) {
            window.location.href = 'authentication-login1.html';
        }
        document.getElementById('display-username').textContent = _username;

        /* ───── Eye toggle ───── */
        function _setupEye(eyeId, inputId, iconId) {
            document.getElementById(eyeId).addEventListener('click', function () {
                const inp = document.getElementById(inputId);
                const isHidden = inp.type === 'password';
                inp.type = isHidden ? 'text' : 'password';
                // Swap icon path between eye and eye-off
                const icon = document.getElementById(iconId);
                if (isHidden) {
                    icon.innerHTML = `
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                        <line x1="1" y1="1" x2="23" y2="23"></line>`;
                } else {
                    icon.innerHTML = `
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>`;
                }
            });
        }
        _setupEye('eye-pass',    'new-pass',     'eye-pass-icon');
        _setupEye('eye-confirm', 'confirm-pass', 'eye-confirm-icon');

        /* ───── Password validation helpers ───── */
        function _checkReqs(pw) {
            return {
                len:     pw.length >= 4,
                upper:   /[A-Z]/.test(pw),
                num:     /[0-9]/.test(pw),
                special: /[.,&@#!]/.test(pw)
            };
        }

        function _strength(pw, reqs) {
            const allOk = reqs.len && reqs.upper && reqs.num && reqs.special;
            if (!allOk || pw.length < 4) return 'weak';
            if (pw.length >= 8) return 'strong';
            return 'acceptable';
        }

        function _updateReqEl(id, ok) {
            const el = document.getElementById(id);
            el.classList.toggle('ok',   ok);
            el.classList.toggle('fail', !ok && el.classList.contains('fail') || false);
            // Only mark fail if the user has started typing
            const pw = document.getElementById('new-pass').value;
            if (pw.length > 0) el.classList.toggle('fail', !ok);
        }

        function _updateStrengthUI(pw) {
            const reqs = _checkReqs(pw);

            _updateReqEl('req-len',     reqs.len);
            _updateReqEl('req-upper',   reqs.upper);
            _updateReqEl('req-num',     reqs.num);
            _updateReqEl('req-special', reqs.special);

            const bar   = document.getElementById('strength-bar');
            const label = document.getElementById('strength-label');

            if (!pw) {
                bar.style.width = '0%';
                bar.style.background = '#dee2e6';
                label.textContent = '—';
                label.style.color = '#adb5bd';
                return;
            }

            const s = _strength(pw, reqs);
            if (s === 'weak') {
                bar.style.width = '33%';
                bar.style.background = '#dc3545';
                label.textContent = 'Weak';
                label.style.color = '#dc3545';
            } else if (s === 'acceptable') {
                bar.style.width = '66%';
                bar.style.background = '#ffc107';
                label.textContent = 'Acceptable';
                label.style.color = '#856404';
            } else {
                bar.style.width = '100%';
                bar.style.background = '#198754';
                label.textContent = 'Strong';
                label.style.color = '#198754';
            }
        }

        function _validate() {
            const pw  = document.getElementById('new-pass').value;
            const cpw = document.getElementById('confirm-pass').value;
            const reqs = _checkReqs(pw);
            const allReqs = reqs.len && reqs.upper && reqs.num && reqs.special;
            const matchEl = document.getElementById('match-msg');

            if (cpw.length > 0) {
                matchEl.classList.remove('d-none');
                if (pw === cpw) {
                    matchEl.textContent = '✔ Passwords match';
                    matchEl.style.color = '#198754';
                } else {
                    matchEl.textContent = '✖ Passwords do not match';
                    matchEl.style.color = '#dc3545';
                }
            } else {
                matchEl.classList.add('d-none');
            }

            const canSubmit = allReqs && (pw === cpw) && cpw.length > 0;
            document.getElementById('btn-submit').disabled = !canSubmit;
        }

        document.getElementById('new-pass').addEventListener('input', function () {
            _updateStrengthUI(this.value);
            _validate();
        });
        document.getElementById('confirm-pass').addEventListener('input', _validate);

        /* ───── Form submit ───── */
        document.getElementById('set-password-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const errBox = document.getElementById('form-error');
            errBox.classList.add('d-none');

            const pw  = document.getElementById('new-pass').value;
            const cpw = document.getElementById('confirm-pass').value;

            if (pw !== cpw) {
                errBox.textContent = 'Passwords do not match.';
                errBox.classList.remove('d-none');
                return;
            }

            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Setting password...';

            try {
                const res = await fetch(`${API_BASE}/auth/set-initial-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: _username, password: pw })
                });
                const data = await res.json();

                if (data.success) {
                    PulpitansAuth.login(_username);
                    window.location.href = 'index.html';
                } else {
                    errBox.textContent = data.error || 'Failed to set password.';
                    errBox.classList.remove('d-none');
                    btn.disabled = false;
                    btn.innerHTML = 'Set Password &amp; Sign In';
                }
            } catch (err) {
                errBox.textContent = 'Could not connect to the server.';
                errBox.classList.remove('d-none');
                btn.disabled = false;
                btn.innerHTML = 'Set Password &amp; Sign In';
            }
        });
    </script>
</body>

</html>
