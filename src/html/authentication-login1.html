<!DOCTYPE html>
<html dir="ltr">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="author" content="">
    <link rel="icon" type="image/svg+xml" href="../assets/images/pulpitans-logo.svg">
    <title>PULPITANS — Login</title>
    <link href="../dist/css/style.min.css" rel="stylesheet">
</head>

<body>
    <div class="main-wrapper">
        <div class="preloader">
            <div class="lds-ripple">
                <div class="lds-pos"></div>
                <div class="lds-pos"></div>
            </div>
        </div>

        <div class="auth-wrapper d-flex no-block justify-content-center align-items-center position-relative"
            style="background:url(../assets/images/big/auth-bg.jpg) no-repeat center center; background-size:cover;">
            <div class="auth-box row" style="max-width:480px;">
                <div class="col-12 bg-white rounded shadow">
                    <div class="p-4">
                        <div class="text-center mb-3">
                            <img src="../assets/images/pulpitans-logo.svg" alt="Pulpitans" style="height:60px;">
                        </div>
                        <h2 class="text-center">Sign In</h2>
                        <p class="text-center text-muted">Enter your credentials to sign in.</p>

                        <div id="login-error" class="alert alert-danger d-none" role="alert"></div>

                        <form id="login-form" class="mt-4">
                            <div class="form-group mb-3">
                                <label class="form-label text-dark" for="uname">User</label>
                                <input type="text" class="form-control" id="uname" placeholder="Enter your username" autocomplete="username">
                            </div>
                            <div class="form-group mb-3">
                                <label class="form-label text-dark" for="upass">Password</label>
                                <input type="password" class="form-control" id="upass" placeholder="System password" autocomplete="current-password">
                            </div>
                            <div class="col-lg-12 text-center">
                                <button type="submit" id="btn-login" class="btn w-100 btn-dark">
                                    Sign In
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/libs/jquery/dist/jquery.min.js"></script>
    <script src="../assets/libs/popper.js/dist/umd/popper.min.js"></script>
    <script src="../assets/libs/bootstrap/dist/js/bootstrap.min.js"></script>
    <script src="../dist/js/auth.js"></script>
    <script>
        const API_BASE = window.PULPITANS_API_BASE || '/api';

        // If already logged in, go to dashboard
        if (PulpitansAuth.getUsername()) {
            window.location.href = 'index.html';
        }

        // Hide preloader
        $(".preloader").fadeOut();

        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const errBox = document.getElementById('login-error');
            errBox.classList.add('d-none');

            const username = document.getElementById('uname').value.trim();
            const password = document.getElementById('upass').value;

            if (!username) {
                errBox.textContent = 'Please enter your username.';
                errBox.classList.remove('d-none');
                return;
            }
            if (!password) {
                errBox.textContent = 'Please enter your password.';
                errBox.classList.remove('d-none');
                return;
            }

            const btn = document.getElementById('btn-login');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Signing in...';

            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    PulpitansAuth.login(username);
                    window.location.href = 'index.html';
                } else {
                    errBox.textContent = data.error || 'Login failed.';
                    errBox.classList.remove('d-none');
                    btn.disabled = false;
                    btn.innerHTML = 'Sign In';
                    document.getElementById('upass').value = '';
                    document.getElementById('upass').focus();
                }
            } catch (err) {
                errBox.textContent = 'Could not connect to the server.';
                errBox.classList.remove('d-none');
                btn.disabled = false;
                btn.innerHTML = 'Sign In';
            }
        });
    </script>
</body>

</html>
